<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Partner Hand - Panel de Cliente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .btn-success {
            background: #48bb78;
        }
        .btn-success:hover {
            background: #38a169;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .info-item {
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
        }
        .info-item label {
            display: block;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .info-item .value {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .status-active {
            background: #c6f6d5;
            color: #22543d;
        }
        .status-inactive {
            background: #fed7d7;
            color: #742a2a;
        }
        .referral-link {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            margin: 10px 0;
            font-family: monospace;
        }
        .copy-btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" style="text-align: center;">
            <h1>👤 Digital Partner Hand</h1>
            <p style="color: #666;">Panel de Cliente</p>
        </div>

        <div class="card" id="loginCard">
            <h2>🔐 Verificar Tu Estado</h2>
            <div class="input-group">
                <label>Número de Cliente</label>
                <input type="text" id="customerNumber" placeholder="Ingresa tu número de cliente" maxlength="8" style="text-transform: uppercase;">
            </div>
            <button class="btn" onclick="checkStatus()">📊 Verificar Estado</button>
        </div>

        <div class="card hidden" id="dashboardCard">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h2>📊 Panel de Control</h2>
                <button class="btn" onclick="logout()" style="width: auto; padding: 8px 20px; background: #fc8181;">Cerrar Sesión</button>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <label>Número de Cliente</label>
                    <div class="value" id="displayNumber">-</div>
                </div>
                <div class="info-item">
                    <label>Estado</label>
                    <div class="value" id="displayStatus">-</div>
                </div>
                <div class="info-item">
                    <label>Días Restantes</label>
                    <div class="value" id="displayDays">-</div>
                </div>
                <div class="info-item">
                    <label>Total Referidos</label>
                    <div class="value" id="displayReferrals">0</div>
                </div>
                <div class="info-item">
                    <label>Pagos Esperados</label>
                    <div class="value" id="displayPayouts">0</div>
                </div>
                <div class="info-item">
                    <label>Total Ganado</label>
                    <div class="value" id="displayEarned">RD$0</div>
                </div>
            </div>

            <div style="margin: 20px 0;">
                <h3>🔗 Tu Enlace de Referidos</h3>
                <div class="referral-link" id="referralLink">Cargando...</div>
                <button class="copy-btn" onclick="copyReferralLink()">📋 Copiar Enlace</button>
            </div>

            <div style="margin: 20px 0;">
                <h3>📋 Historial de Referidos</h3>
                <div id="referralHistory">
                    <p style="color: #666;">Sin referidos aún</p>
                </div>
            </div>

            <div style="margin: 20px 0;">
                <h3>💰 Historial de Pagos</h3>
                <div id="paymentHistory">
                    <p style="color: #666;">Sin pagos aún</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        // Check status
        async function checkStatus() {
            const customerNumber = document.getElementById('customerNumber').value.trim().toUpperCase();
            
            if (!customerNumber) {
                alert('Por favor ingresa tu número de cliente');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/check-status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customerNumber })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Número de cliente inválido');
                }

                const data = await response.json();
                showDashboard(data);
                
            } catch (error) {
                alert('❌ ' + error.message);
                console.error('Status check error:', error);
            }
        }

        // Show dashboard
        function showDashboard(data) {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('dashboardCard').classList.remove('hidden');

            document.getElementById('displayNumber').textContent = data.customerNumber;
            
            // Status
            const statusEl = document.getElementById('displayStatus');
            if (data.isActive) {
                statusEl.innerHTML = '<span class="status-badge status-active">✅ Activo</span>';
            } else {
                statusEl.innerHTML = '<span class="status-badge status-inactive">❌ Expirado</span>';
            }
            
            document.getElementById('displayDays').textContent = data.daysLeft + ' días';
            document.getElementById('displayReferrals').textContent = data.referralCount || 0;
            document.getElementById('displayPayouts').textContent = data.expectedPayouts || 0;
            document.getElementById('displayEarned').textContent = `RD$${data.totalPaid.toLocaleString() || 0}`;

            // Referral link
            const link = `${window.location.origin}/join?ref=${data.customerNumber}`;
            document.getElementById('referralLink').textContent = link;

            // Referral history
            const historyEl = document.getElementById('referralHistory');
            if (data.referralsList && data.referralsList.length > 0) {
                historyEl.innerHTML = data.referralsList.map(ref => 
                    `<div style="padding: 5px 0; border-bottom: 1px solid #e2e8f0;">🔹 ${ref}</div>`
                ).join('');
            } else {
                historyEl.innerHTML = '<p style="color: #666;">Sin referidos aún</p>';
            }

            // Payment history
            const paymentEl = document.getElementById('paymentHistory');
            if (data.paymentHistory && data.paymentHistory.length > 0) {
                paymentEl.innerHTML = data.paymentHistory.map(p => 
                    `<div style="padding: 5px 0; border-bottom: 1px solid #e2e8f0;">
                        RD$${p.amount.toLocaleString()} - ${p.status} 
                        <small style="color: #666;">(${new Date(p.payment_date).toLocaleDateString('es-DO')})</small>
                    </div>`
                ).join('');
            } else {
                paymentEl.innerHTML = '<p style="color: #666;">Sin pagos aún</p>';
            }
        }

        // Copy referral link
        function copyReferralLink() {
            const link = document.getElementById('referralLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                alert('📋 Enlace copiado al portapapeles!');
            });
        }

        // Logout
        function logout() {
            document.getElementById('loginCard').classList.remove('hidden');
            document.getElementById('dashboardCard').classList.add('hidden');
            document.getElementById('customerNumber').value = '';
        }

        // Enter key support
        document.getElementById('customerNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkStatus();
            }
        });
    </script>
</body>
</html>
