<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Conecta Y Gana RD</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        h1 { color: #1a73e8; }
        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #e8eaed; }
        .stat-card .number { font-size: 24px; font-weight: 700; color: #1a73e8; }
        .stat-card .label { font-size: 12px; color: #5f6368; }
        .section { margin-top: 25px; border-top: 1px solid #e8eaed; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e8eaed; }
        th { background: #f8f9fa; font-weight: 600; }
        .btn { background: #1a73e8; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #1557b0; }
        .hidden { display: none; }
        .error-msg { background: #fce8e6; color: #d93025; padding: 15px; border-radius: 8px; margin: 20px 0; }
        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #9aa0a6; }
        .footer a { color: #1a73e8; text-decoration: none; }
        .loading { text-align: center; padding: 40px; color: #5f6368; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>📊 Conecta Y Gana RD</h1>

        <div id="loading" class="loading">
            <p>⏳ Cargando tu información...</p>
        </div>

        <div id="error-area" class="hidden"></div>

        <div id="content" class="hidden">
            <p id="user-name">👋 Bienvenido, <strong>Cargando...</strong></p>

            <div class="stats">
                <div class="stat-card"><div class="number" id="stat-total">0</div><div class="label">Total Referidos</div></div>
                <div class="stat-card"><div class="number" id="stat-active">0</div><div class="label">Activos</div></div>
                <div class="stat-card"><div class="number" id="stat-pending">0</div><div class="label">Pendientes</div></div>
                <div class="stat-card"><div class="number" id="stat-earnings">RD$0</div><div class="label">Ganancias</div></div>
            </div>

            <div class="section">
                <h3>🔗 Tu enlace de referido</h3>
                <input type="text" id="referral-link" readonly style="width:80%; padding:8px; border:1px solid #dadce0; border-radius:4px;">
                <button class="btn" onclick="copyLink()">📋 Copiar</button>
            </div>

            <div class="section">
                <h3>👥 Tus referidos</h3>
                <table>
                    <thead><tr><th>Nombre</th><th>Teléfono</th><th>Estado</th><th>Fecha</th></tr></thead>
                    <tbody id="referrals-list"></tbody>
                </table>
            </div>

            <div class="section">
                <h3>💰 Pagos</h3>
                <table>
                    <thead><tr><th>Hito</th><th>Monto</th><th>Estado</th><th>Fecha</th></tr></thead>
                    <tbody id="payouts-list"></tbody>
                </table>
            </div>

            <div class="section">
                <h3>🏦 Datos Bancarios</h3>
                <form id="banking-form">
                    <input type="text" id="bank-name" placeholder="Banco" required style="width:30%; padding:8px; margin-right:10px;">
                    <input type="text" id="account-number" placeholder="Cuenta" required style="width:30%; padding:8px; margin-right:10px;">
                    <select id="account-type" style="padding:8px;">
                        <option value="corriente">Corriente</option>
                        <option value="ahorros">Ahorros</option>
                    </select>
                    <button type="submit" class="btn">Guardar</button>
                </form>
            </div>

            <div class="footer">
                <a href="/">🏠 Inicio</a> | <a href="/admin">🛠️ Admin</a> | <a href="/terms">📜 Términos</a>
            </div>
        </div>
    </div>

    <script>
        // v2.2 - 2026-07-21 - No phone normalization
        const API_BASE = '';
        const PHONE_KEY = 'dashboard_phone';

        const loading = document.getElementById('loading');
        const content = document.getElementById('content');
        const errorArea = document.getElementById('error-area');
        const userName = document.getElementById('user-name');

        function getPhone() {
            return localStorage.getItem(PHONE_KEY) || '';
        }
        function savePhone(p) {
            localStorage.setItem(PHONE_KEY, p);
        }

        function showError(message) {
            errorArea.classList.remove('hidden');
            errorArea.innerHTML = `<div class="error-msg">❌ ${message}</div>`;
            loading.classList.add('hidden');
        }

        function hideError() {
            errorArea.classList.add('hidden');
            errorArea.innerHTML = '';
        }

        async function loadDashboard(phone) {
            try {
                hideError();
                loading.classList.remove('hidden');
                content.classList.add('hidden');

                const userRes = await fetch(`${API_BASE}/api/user/${phone}`);
                if (!userRes.ok) {
                    if (userRes.status === 404) {
                        const msg = 'Usuario no encontrado. Registrate primero.';
                        alert(msg);
                        const urlParams = new URLSearchParams(window.location.search);
                        const ref = urlParams.get('ref') || '';
                        const redirectUrl = ref ? `/?ref=${ref}` : '/';
                        window.location.href = redirectUrl;
                        return;
                    }
                    throw new Error(`HTTP ${userRes.status}`);
                }

                const user = await userRes.json();
                const refRes = await fetch(`${API_BASE}/api/user/${phone}/referrals`);
                const referrals = refRes.ok ? await refRes.json() : { referrals: [] };
                const payRes = await fetch(`${API_BASE}/api/user/${phone}/payouts`);
                const payouts = payRes.ok ? await payRes.json() : { payouts: [] };

                renderDashboard(user, referrals, payouts);
                loading.classList.add('hidden');
                content.classList.remove('hidden');
            } catch (err) {
                console.error('Dashboard error:', err);
                showError('Error al cargar el dashboard: ' + err.message);
                loading.classList.add('hidden');
            }
        }

        function renderDashboard(user, referrals, payouts) {
            userName.innerHTML = `👋 Bienvenido, <strong>${user.name || 'Usuario'}</strong>`;
            document.getElementById('stat-total').textContent = user.totalCustomers || 0;
            document.getElementById('stat-active').textContent = user.activeCustomers || 0;
            document.getElementById('stat-pending').textContent = user.pendingCustomers || 0;
            document.getElementById('stat-earnings').textContent = `RD$${user.totalPaid || 0}`;

            const baseUrl = window.location.origin;
            const code = user.referralCode || '';
            document.getElementById('referral-link').value = code ? `${baseUrl}/?ref=${code}` : '⚠️ Sin código aún';

            const refList = referrals.referrals || [];
            const refTbody = document.getElementById('referrals-list');
            if (refList.length === 0) {
                refTbody.innerHTML = '<tr><td colspan="4">No hay referidos aún</td></tr>';
            } else {
                refTbody.innerHTML = refList.map(r => `
                    <tr><td>${r.name}</td><td>${r.phone}</td><td>${r.status.toUpperCase()}</td><td>${new Date(r.createdAt).toLocaleDateString()}</td></tr>
                `).join('');
            }

            const payList = payouts.payouts || [];
            const payTbody = document.getElementById('payouts-list');
            if (payList.length === 0) {
                payTbody.innerHTML = '<tr><td colspan="4">No hay pagos aún</td></tr>';
            } else {
                payTbody.innerHTML = payList.map(p => `
                    <tr><td>${p.milestone || '-'}</td><td>RD$${p.amount}</td><td>${p.status.toUpperCase()}</td><td>${new Date(p.createdAt).toLocaleDateString()}</td></tr>
                `).join('');
            }

            if (user.bankingDetails) {
                document.getElementById('bank-name').value = user.bankingDetails.bankName || '';
                document.getElementById('account-number').value = user.bankingDetails.accountNumber || '';
                document.getElementById('account-type').value = user.bankingDetails.accountType || '';
            }

            savePhone(user.phone);
        }

        function copyLink() {
            const input = document.getElementById('referral-link');
            if (!input.value || input.value.includes('⚠️')) {
                alert('No hay enlace para copiar aún.');
                return;
            }
            navigator.clipboard.writeText(input.value).then(() => alert('✅ Enlace copiado!'));
        }

        document.getElementById('banking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = getPhone();
            const bankName = document.getElementById('bank-name').value.trim();
            const accountNumber = document.getElementById('account-number').value.trim();
            const accountType = document.getElementById('account-type').value;

            if (!phone) { alert('No se encontró tu número. Recarga la página.'); return; }
            if (!bankName || !accountNumber || !accountType) { alert('Completa todos los campos bancarios.'); return; }

            try {
                const res = await fetch(`${API_BASE}/api/user/update-banking`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, bankName, accountNumber, accountType })
                });
                const data = await res.json();
                alert(data.success ? '✅ Datos bancarios guardados.' : '❌ Error: ' + data.error);
            } catch (err) {
                alert('Error de conexión.');
            }
        });

        // =============================================
        // INIT
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            let phone = params.get('phone') || getPhone();

            if (!phone) {
                const userPhone = prompt('📱 Ingresa tu número de teléfono (ej: 8498634889):');
                if (userPhone) {
                    phone = userPhone.replace(/\D/g, ''); // only digits, no country code
                    savePhone(phone);
                } else {
                    window.location.href = '/';
                    return;
                }
            }

            if (phone) {
                loadDashboard(phone);
            } else {
                showError('No se pudo obtener tu número. Intenta de nuevo.');
            }
        });
    </script>
</body>
</html>
